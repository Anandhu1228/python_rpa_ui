services:
  rpa_studio:
    build: .
    container_name: rpa_studio
    ipc: "host"           # needed by Chromium for shared memory
    ports:
      - "10090:10090"       # UI + API at http://localhost:10090
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      # Persist ALL storage data (recipes, uploads, logs, AND auth.db) across restarts
      - ./storage:/app/storage
      # Hot-reload frontend without rebuild (dev convenience)
      - ./frontend:/app/frontend:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10090/"]
      interval: 30s
      timeout: 10s
      retries: 3